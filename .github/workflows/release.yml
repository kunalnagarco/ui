name: Release

on:
  push:
    branches:
      - "**"
      - "!main"
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  publish-alpha:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build all packages
        run: npm run build:all

      - name: Get OIDC token for npm trusted publishing
        id: oidc_alpha
        run: |
          OIDC_TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            | jq -r '.value')
          echo "token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

      - name: Publish alpha pre-releases
        env:
          NODE_AUTH_TOKEN: ${{ steps.oidc_alpha.outputs.token }}
        run: node scripts/publish-prerelease.mjs

  release:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Get changed files
        id: changed
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bump versions and update changelogs
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node scripts/release.mjs

      - name: Build all packages
        run: npm run build:all

      - name: Commit version bumps and changelogs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json packages/*/CHANGELOG.md
          git diff --staged --quiet && echo "Nothing to commit, skipping." && exit 0
          git commit -m "chore: release [skip ci]"

      - name: Create git tags and push
        run: |
          node -e "
            const releases = JSON.parse(require('fs').readFileSync('.released-packages.json'));
            for (const { name, version } of Object.values(releases)) {
              require('child_process').execSync(\`git tag '\${name}@\${version}'\`);
            }
          "
          git push origin main --tags

      - name: Get OIDC token for npm trusted publishing
        id: oidc_release
        run: |
          OIDC_TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            | jq -r '.value')
          echo "token=$OIDC_TOKEN" >> $GITHUB_OUTPUT

      - name: Publish released packages
        env:
          NODE_AUTH_TOKEN: ${{ steps.oidc_release.outputs.token }}
        run: |
          node -e "
            const { execSync } = require('child_process');
            const releases = JSON.parse(require('fs').readFileSync('.released-packages.json'));
            for (const [dir] of Object.entries(releases)) {
              execSync(\`npm publish --workspace=\${dir} --provenance --access public --tag latest\`, { stdio: 'inherit' });
            }
          "
